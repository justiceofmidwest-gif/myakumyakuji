<script>
// おみくじデータ（31種／weight合計1000。31番のみ weight10=約1%、他は weight33=約3.3%）
const omikuji = [
  { name: "人脈（じんみゃく）", desc: "素敵なご縁に恵まれ、助け合える仲間ができるでしょう。", weight: 33 },
  { name: "人脈（じんみゃく）", desc: "思いがけない出会いが、未来を大きく変えるきっかけになるでしょう。", weight: 33 },
  { name: "脈々（みゃくみゃく）", desc: "大切な伝統や想いを受け継ぎ、次へ繋げることができるでしょう。", weight: 33 },
  { name: "脈々（みゃくみゃく）", desc: "あなたの今日の行動が、未来へと脈々と受け継がれていくでしょう。", weight: 33 },
  { name: "脈拍（みゃくはく）", desc: "心身ともに健康で、リズムが安定しているでしょう。", weight: 33 },
  { name: "脈拍（みゃくはく）", desc: "焦らず自分のペースを大切にすると、良い流れをつかめるでしょう。", weight: 33 },
  { name: "脈絡（みゃくらく）", desc: "物事の筋道が見え、賢明な判断ができるでしょう。", weight: 33 },
  { name: "脈絡（みゃくらく）", desc: "点と点がつながり、長く悩んでいたことの答えが見えてくるでしょう。", weight: 33 },
  { name: "山脈（さんみゃく）", desc: "大きな志を持ち、さらなる高みへ到達できるでしょう。", weight: 33 },
  { name: "山脈（さんみゃく）", desc: "目の前の一歩を積み重ねれば、いつか大きな頂に立てるでしょう。", weight: 33 },
  { name: "水脈（すいみゃく）", desc: "知恵やアイデアが枯れることなく湧き出し続けるでしょう。", weight: 33 },
  { name: "水脈（すいみゃく）", desc: "眠っていた可能性の泉が見つかり、新しい挑戦へつながるでしょう。", weight: 33 },
  { name: "気脈（きみゃく）", desc: "周囲の人と心が通じ合い、最高の連携が取れるでしょう。", weight: 33 },
  { name: "気脈（きみゃく）", desc: "息の合った仲間との協力が、大きな成果を生み出すでしょう。", weight: 33 },
  { name: "地脈（ちみゃく）", desc: "場所や環境のエネルギーを味方につけ、安定するでしょう。", weight: 33 },
  { name: "地脈（ちみゃく）", desc: "今いる場所こそが、あなたを大きく成長させる舞台になるでしょう。", weight: 33 },
  { name: "鉱脈（こうみゃく）", desc: "自分の中に眠っていた新しい才能や宝を発見するでしょう。", weight: 33 },
  { name: "鉱脈（こうみゃく）", desc: "努力を続けた先に、思いもよらない大きな実りが待っているでしょう。", weight: 33 },
  { name: "脈あり（みゃくあり）", desc: "期待していたことに光が差し、願いが叶う兆しが見えるでしょう。", weight: 33 },
  { name: "脈あり（みゃくあり）", desc: "今日の一歩が、うれしい返事や新たなチャンスを呼び込むでしょう。", weight: 33 },
  { name: "ミャクミャク", desc: "変化を楽しみながら、生命力あふれる未来を切り拓くことができるでしょう。", weight: 33 },
  { name: "ミャクミャク", desc: "違いを受け入れることで、自分らしい未来が大きく広がるでしょう。", weight: 33 },
  { name: "動脈（どうみゃく）", desc: "力強いエネルギーが巡り、新しい挑戦へ踏み出せるでしょう。", weight: 33 },
  { name: "静脈（じょうみゃく）", desc: "心を落ち着かせることで、本当に大切なものが見えてくるでしょう。", weight: 33 },
  { name: "葉脈（ようみゃく）", desc: "小さな努力が枝葉のように広がり、大きな実りへ育っていくでしょう。", weight: 33 },
  { name: "文脈（ぶんみゃく）", desc: "物事の背景を理解することで、より良い選択ができるでしょう。", weight: 33 },
  { name: "命脈（めいみゃく）", desc: "大切にしてきたことが未来へ受け継がれ、新たな希望につながるでしょう。", weight: 33 },
  { name: "血脈（けつみゃく）", desc: "受け継がれた力や支えが、あなたの背中を押してくれるでしょう。", weight: 33 },
  { name: "一脈相通ず（いちみゃくあいつうず）", desc: "言葉にしなくても思いは伝わり、大切な人との絆が深まるでしょう。", weight: 33 },
  { name: "脈診（みゃくしん）", desc: "自分自身の心と体の声に耳を傾けることで、幸運への道が開けるでしょう。", weight: 33 },
  { name: "脈々（レアみゃくみゃく）", desc: "あなたの想いは今日だけでは終わりません。その優しさや挑戦は、誰かへ、そして未来へ脈々と受け継がれていくでしょう。", weight: 10, rare: true }
];

const STORAGE_DATE = "myakumyakuji31-date";
const STORAGE_RESULT = "myakumyakuji31-result";

function pickWeighted() {
  const total = omikuji.reduce((sum, o) => sum + o.weight, 0);
  let r = Math.random() * total;
  for (const o of omikuji) {
    if (r < o.weight) return o;
    r -= o.weight;
  }
  return omikuji[omikuji.length - 1];
}

function draw() {
  const today = new Date().toDateString();
  const savedDate = localStorage.getItem(STORAGE_DATE);

  if (savedDate === today) {
    show(JSON.parse(localStorage.getItem(STORAGE_RESULT)));
    return;
  }

  document.getElementById("drawBtn").disabled = true;
  document.getElementById("status").innerText = "……シャッフル中……";
  const card = document.getElementById("card");
  card.classList.remove("show", "rare");

  setTimeout(() => {
    const result = pickWeighted();
    localStorage.setItem(STORAGE_DATE, today);
    localStorage.setItem(STORAGE_RESULT, JSON.stringify(result));
    show(result);
  }, 1200);
}

function show(r) {
  document.getElementById("status").innerText = "";
  document.getElementById("name").innerText = r.name;
  document.getElementById("desc").innerText = r.desc;
  document.getElementById("thanks").innerText = "ありがとう！また明日も来てね 🌱";

  const card = document.getElementById("card");
  card.classList.add("show");
  card.classList.toggle("rare", !!r.rare);
  document.getElementById("rareLabel").style.display = r.rare ? "inline-block" : "none";

  document.getElementById("drawBtn").disabled = false;
  enableShareButtons(true);
}

function getResultText() {
  const saved = localStorage.getItem(STORAGE_RESULT);
  if (!saved) return "みゃくみゃくじ（31種）で今日の運を占おう！";
  const r = JSON.parse(saved);
  return `【みゃくみゃくじ】今日の結果は「${r.name}」でした！\n${r.desc}`;
}

function enableShareButtons(enabled) {
  document.querySelectorAll(".share-buttons button").forEach(b => b.disabled = !enabled);
}

// SNSシェア（結果の内容を含めてシェア）
function shareX() {
  const url = encodeURIComponent(location.href);
  const text = encodeURIComponent(getResultText() + "\n#みゃくみゃくじ");
  window.open(`https://twitter.com/intent/tweet?url=${url}&text=${text}`, "_blank", "noopener,noreferrer");
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch (e) {
    // clipboard API が使えない環境向けフォールバック
    const temp = document.createElement("textarea");
    temp.value = text;
    temp.style.position = "fixed";
    temp.style.opacity = "0";
    document.body.appendChild(temp);
    temp.select();
    let ok = false;
    try {
      document.execCommand("copy");
      ok = true;
    } catch (e2) {
      ok = false;
    }
    document.body.removeChild(temp);
    return ok;
  }
}

// Facebookのシェアダイアログは quote パラメータをほとんど反映しないため、
// 結果テキストを先にコピーしてから開き、貼り付けてもらう形にする
async function shareFacebook() {
  const url = encodeURIComponent(location.href);
  const quote = encodeURIComponent(getResultText());
  const toast = document.getElementById("copyToast");
  const copied = await copyText(getResultText());
  toast.innerText = copied
    ? "結果をコピーしました。Facebookの投稿欄に貼り付けてください！"
    : "Facebookの投稿画面が開きます。";
  window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${quote}`, "_blank", "noopener,noreferrer");
  setTimeout(() => { toast.innerText = ""; }, 4000);
}

function shareLINE() {
  const url = encodeURIComponent(location.href);
  const text = encodeURIComponent(getResultText());
  window.open(`https://social-plugins.line.me/lineit/share?url=${url}&text=${text}`, "_blank", "noopener,noreferrer");
}

async function copyLink() {
  const toast = document.getElementById("copyToast");
  const copied = await copyText(location.href);
  toast.innerText = copied ? "リンクをコピーしました！" : "コピーに失敗しました。URLを手動でコピーしてください。";
  setTimeout(() => { toast.innerText = ""; }, 2500);
}

document.addEventListener("DOMContentLoaded", () => {
  const today = new Date().toDateString();
  if (localStorage.getItem(STORAGE_DATE) === today) {
    show(JSON.parse(localStorage.getItem(STORAGE_RESULT)));
  } else {
    enableShareButtons(false);
  }
});
</script>
